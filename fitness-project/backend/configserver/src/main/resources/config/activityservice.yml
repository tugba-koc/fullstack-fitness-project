server:
  port: 8082

spring:
  profiles:
    include: local
  data:
    mongodb:
      uri: mongodb+srv://${ACTIVITY_DB_USER}:${ACTIVITY_DB_PASSWORD}@fitness-cluster.abj21cx.mongodb.net/${ACTIVITY_DB_NAME}?retryWrites=true&w=majority
      database: ${ACTIVITY_DB_NAME}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
  
