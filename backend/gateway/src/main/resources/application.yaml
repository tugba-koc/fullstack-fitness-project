spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: activity-service
          uri: lb://activityservice
          predicates:
            - Path=/api/activities/**
        - id: ai-service
          uri: lb://aiservice
          predicates:
            - Path=/api/recommendations/**
        - id: user-service
          uri: lb://userservice
          predicates:
            - Path=/api/users/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
