server:
  port: 8083

spring:
  profiles:
    include: local
  data:
    mongodb:
      uri: mongodb+srv://${AI_DB_USER}:${AI_DB_PASSWORD}@fitness-cluster.abj21cx.mongodb.net/${AI_DB_NAME}?retryWrites=true&w=majority
      database: ${AI_DB_NAME}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: ${GEMINI_API_URL}
    
